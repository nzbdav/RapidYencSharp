name: Publish Package

on:
  workflow_call:
    inputs:
      tag_name:
        description: Release tag to publish
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to publish
        required: true
        type: string
  release:
    types:
      - published

permissions:
  contents: read
  attestations: write
  id-token: write

concurrency:
  group: publish-${{ inputs.tag_name || github.event.release.tag_name }}
  cancel-in-progress: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  RELEASE_TAG: ${{ inputs.tag_name || github.event.release.tag_name }}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          submodules: true

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Verify release version
        shell: bash
        run: |
          version="$(dotnet msbuild RapidYencSharp/RapidYencSharp.csproj -getProperty:Version)"
          test "${RELEASE_TAG}" = "v${version}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build release artifacts
        run: docker buildx build --target export --output type=local,dest=. .

      - name: Validate package contents
        run: python3 scripts/validate-package.py artifacts/packages

      - name: Upload release packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages-${{ env.RELEASE_TAG }}
          path: artifacts/packages/*
          if-no-files-found: error
          retention-days: 30

      - name: Attest package provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: artifacts/packages/*

      - name: Log in to NuGet.org with trusted publishing
        id: login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet.org
        run: dotnet nuget push "artifacts/packages/*.nupkg" --source "https://api.nuget.org/v3/index.json" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --skip-duplicate
